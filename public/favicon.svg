<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#0f0c08"/>
  <rect x="8" y="8" width="84" height="84" rx="16" fill="none" stroke="#D4A754" stroke-width="2"/>
  <g transform="translate(50,50)">
